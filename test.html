<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Product Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a38;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --danger: #ff4444;
    --success: #44ffaa;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .header-actions { display: flex; gap: 12px; align-items: center; }

  /* Buttons */
  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 10px 20px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0f;
    font-weight: 700;
  }
  .btn-primary:hover { background: #d4eb30; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(232,255,71,0.3); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger { background: rgba(255,68,68,0.15); color: var(--danger); border: 1px solid rgba(255,68,68,0.3); }
  .btn-danger:hover { background: rgba(255,68,68,0.25); }

  .btn-success { background: rgba(68,255,170,0.15); color: var(--success); border: 1px solid rgba(68,255,170,0.3); }
  .btn-success:hover { background: rgba(68,255,170,0.25); }

  .btn-sm { padding: 6px 14px; font-size: 11px; }

  /* Layout */
  .container { max-width: 1400px; margin: 0 auto; padding: 40px; position: relative; z-index: 1; }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 240px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px 12px 44px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  select.filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  select.filter-select:focus { border-color: var(--accent); }

  /* Products grid */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    position: relative;
    transition: all 0.25s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .product-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(232,255,71,0.08);
  }

  .product-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .product-id {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .product-name {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.2;
    max-width: 200px;
  }

  .product-actions { display: flex; gap: 8px; }

  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:hover.edit { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.1); }
  .icon-btn:hover.delete { border-color: var(--danger); color: var(--danger); background: rgba(255,68,68,0.1); }

  .product-category {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 100px;
    background: rgba(255,107,53,0.15);
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.3);
    margin-bottom: 12px;
  }

  .product-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .product-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .product-price {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
  }

  .product-stock {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stock-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .in-stock { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .low-stock { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; }
  .out-stock { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

  .empty-state {
    text-align: center;
    padding: 80px 40px;
    color: var(--muted);
    grid-column: 1/-1;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 560px;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s;
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
  }

  .modal-close {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { border-color: var(--danger); color: var(--danger); }

  /* Form */
  .form-group { margin-bottom: 20px; }

  .form-label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 100px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .form-footer {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  /* JSON viewer */
  .json-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-top: 40px;
  }

  .json-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .json-panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .json-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 100px;
    background: rgba(232,255,71,0.15);
    color: var(--accent);
    border: 1px solid rgba(232,255,71,0.3);
  }

  .json-body {
    padding: 24px;
    font-size: 12px;
    line-height: 1.7;
    max-height: 320px;
    overflow-y: auto;
    white-space: pre;
    color: #c0c0d8;
  }

  .json-body .key { color: #79b8ff; }
  .json-body .string { color: #9be49b; }
  .json-body .number { color: #f0c36d; }
  .json-body .bool { color: #ff8c8c; }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 280px;
    animation: slideIn 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.success { border-color: rgba(68,255,170,0.4); }
  .toast.error { border-color: rgba(255,68,68,0.4); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Confirm modal */
  .confirm-modal {
    max-width: 400px;
    text-align: center;
  }

  .confirm-icon { font-size: 48px; margin-bottom: 16px; }
  .confirm-msg { color: var(--muted); font-size: 13px; line-height: 1.7; margin-bottom: 8px; }

  /* Responsive */
  @media (max-width: 768px) {
    header { padding: 0 20px; }
    .container { padding: 24px 20px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    ProductAdmin
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="importJSON()">⬆ Import JSON</button>
    <button class="btn btn-ghost btn-success" onclick="exportJSON()">⬇ Export JSON</button>
    <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
  </div>
</header>

<!-- Main -->
<div class="container">

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total Products</div>
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-sub">in inventory</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Categories</div>
      <div class="stat-value" id="stat-cats">0</div>
      <div class="stat-sub">unique types</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Value</div>
      <div class="stat-value" id="stat-value">$0</div>
      <div class="stat-sub">inventory worth</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Low Stock</div>
      <div class="stat-value" id="stat-low">0</div>
      <div class="stat-sub">need restocking</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search products..." oninput="renderProducts()">
    </div>
    <select class="filter-select" id="cat-filter" onchange="renderProducts()">
      <option value="">All Categories</option>
    </select>
    <select class="filter-select" id="stock-filter" onchange="renderProducts()">
      <option value="">All Stock</option>
      <option value="in">In Stock</option>
      <option value="low">Low Stock</option>
      <option value="out">Out of Stock</option>
    </select>
  </div>

  <!-- Products Grid -->
  <div class="products-grid" id="products-grid"></div>

  <!-- JSON Panel -->
  <div class="json-panel">
    <div class="json-panel-header">
      <div class="json-panel-title">
        📄 JSON Data Store
        <span class="json-badge">products.json</span>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="copyJSON()">Copy JSON</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleJSON()">Toggle View</button>
      </div>
    </div>
    <div class="json-body" id="json-view"></div>
  </div>

</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Product</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">Product Name *</label>
      <input type="text" class="form-input" id="f-name" placeholder="e.g. Wireless Headphones">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Price (USD) *</label>
        <input type="number" class="form-input" id="f-price" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Stock Quantity *</label>
        <input type="number" class="form-input" id="f-stock" placeholder="0" min="0">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Category *</label>
      <input type="text" class="form-input" id="f-category" placeholder="e.g. Electronics, Clothing..." list="cat-list">
      <datalist id="cat-list"></datalist>
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="f-desc" placeholder="Product description..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">SKU</label>
        <input type="text" class="form-input" id="f-sku" placeholder="Auto-generated if empty">
      </div>
      <div class="form-group">
        <label class="form-label">Image URL</label>
        <input type="text" class="form-input" id="f-image" placeholder="https://...">
      </div>
    </div>

    <div class="form-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal confirm-modal">
    <div class="confirm-icon">🗑</div>
    <div class="modal-title" style="margin-bottom:12px;">Delete Product?</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="form-footer" style="justify-content:center;">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Delete</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toasts"></div>

<!-- Hidden file input for import -->
<input type="file" id="json-import" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
const STORAGE_KEY = 'productadmin_data';
let products = [];
let editingId = null;
let jsonVisible = true;

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { products = JSON.parse(raw); } catch { products = []; }
  } else {
    // Demo seed data
    products = [
      { id: 'PRD-001', name: 'Wireless Noise-Cancelling Headphones', price: 299.99, stock: 45, category: 'Electronics', description: 'Premium over-ear headphones with 30hr battery life and adaptive ANC.', sku: 'ELC-HP-001', image: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: 'PRD-002', name: 'Ergonomic Desk Chair', price: 549.00, stock: 8, category: 'Furniture', description: 'Lumbar-support mesh chair with adjustable armrests and 5-year warranty.', sku: 'FRN-CH-002', image: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: 'PRD-003', name: 'Organic Green Tea Set', price: 34.50, stock: 0, category: 'Food & Beverage', description: 'Hand-picked ceremonial-grade matcha from Uji, Japan. 100g tin.', sku: 'FOD-TE-003', image: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: 'PRD-004', name: 'Mechanical Keyboard TKL', price: 149.99, stock: 22, category: 'Electronics', description: 'Tenkeyless layout with Cherry MX switches, per-key RGB, PBT keycaps.', sku: 'ELC-KB-004', image: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
    ];
    save();
  }
  render();
}

// ── Persistence ───────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products, null, 2));
  updateJSON();
  updateStats();
  updateCategoryFilter();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  renderProducts();
  updateJSON();
  updateStats();
  updateCategoryFilter();
}

function renderProducts() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const catFilter = document.getElementById('cat-filter').value;
  const stockFilter = document.getElementById('stock-filter').value;

  let filtered = products.filter(p => {
    const matchSearch = !search || p.name.toLowerCase().includes(search) || p.category.toLowerCase().includes(search) || p.sku.toLowerCase().includes(search);
    const matchCat = !catFilter || p.category === catFilter;
    const matchStock = !stockFilter || (
      stockFilter === 'in' && p.stock > 10 ||
      stockFilter === 'low' && p.stock > 0 && p.stock <= 10 ||
      stockFilter === 'out' && p.stock === 0
    );
    return matchSearch && matchCat && matchStock;
  });

  const grid = document.getElementById('products-grid');

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No products found</div><div style="font-size:13px">Try adjusting your search or filters.</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const stockClass = p.stock === 0 ? 'out-stock' : p.stock <= 10 ? 'low-stock' : 'in-stock';
    const stockLabel = p.stock === 0 ? 'Out of stock' : p.stock <= 10 ? `Low (${p.stock})` : `In stock (${p.stock})`;
    return `
    <div class="product-card">
      <div class="product-card-header">
        <div>
          <div class="product-id">${p.id} · ${p.sku}</div>
          <div class="product-name">${escHtml(p.name)}</div>
        </div>
        <div class="product-actions">
          <button class="icon-btn edit" onclick="openModal('${p.id}')" title="Edit">✏</button>
          <button class="icon-btn delete" onclick="confirmDelete('${p.id}')" title="Delete">🗑</button>
        </div>
      </div>
      <span class="product-category">${escHtml(p.category)}</span>
      <div class="product-desc">${escHtml(p.description || '—')}</div>
      <div class="product-footer">
        <div class="product-price">$${Number(p.price).toFixed(2)}</div>
        <div class="product-stock">
          <span class="stock-dot ${stockClass}"></span>
          ${stockLabel}
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateStats() {
  const total = products.length;
  const cats = new Set(products.map(p => p.category)).size;
  const value = products.reduce((s, p) => s + p.price * p.stock, 0);
  const low = products.filter(p => p.stock > 0 && p.stock <= 10).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-cats').textContent = cats;
  document.getElementById('stat-value').textContent = '$' + formatNum(value);
  document.getElementById('stat-low').textContent = low;
}

function updateCategoryFilter() {
  const cats = [...new Set(products.map(p => p.category))].sort();
  const select = document.getElementById('cat-filter');
  const current = select.value;
  select.innerHTML = '<option value="">All Categories</option>' + cats.map(c => `<option value="${escHtml(c)}" ${c === current ? 'selected' : ''}>${escHtml(c)}</option>`).join('');

  // datalist
  const dl = document.getElementById('cat-list');
  dl.innerHTML = cats.map(c => `<option value="${escHtml(c)}">`).join('');
}

// ── JSON View ─────────────────────────────────────────────────────────────────
function updateJSON() {
  if (!jsonVisible) return;
  const json = JSON.stringify({ products, lastUpdated: new Date().toISOString(), count: products.length }, null, 2);
  document.getElementById('json-view').innerHTML = syntaxHighlight(json);
}

function syntaxHighlight(json) {
  return json
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
      let cls = 'number';
      if (/^"/.test(match)) cls = /:$/.test(match) ? 'key' : 'string';
      else if (/true|false/.test(match)) cls = 'bool';
      return `<span class="${cls}">${match}</span>`;
    });
}

function toggleJSON() {
  jsonVisible = !jsonVisible;
  const body = document.getElementById('json-view');
  body.style.display = jsonVisible ? '' : 'none';
  if (jsonVisible) updateJSON();
}

function copyJSON() {
  const json = JSON.stringify({ products, lastUpdated: new Date().toISOString(), count: products.length }, null, 2);
  navigator.clipboard.writeText(json).then(() => toast('JSON copied to clipboard!', 'success'));
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  const modal = document.getElementById('product-modal');
  const title = document.getElementById('modal-title');

  if (id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    title.textContent = 'Edit Product';
    document.getElementById('f-name').value = p.name;
    document.getElementById('f-price').value = p.price;
    document.getElementById('f-stock').value = p.stock;
    document.getElementById('f-category').value = p.category;
    document.getElementById('f-desc').value = p.description || '';
    document.getElementById('f-sku').value = p.sku || '';
    document.getElementById('f-image').value = p.image || '';
  } else {
    title.textContent = 'Add Product';
    ['f-name','f-price','f-stock','f-category','f-desc','f-sku','f-image'].forEach(id => document.getElementById(id).value = '');
  }

  modal.classList.add('open');
}

function closeModal() { document.getElementById('product-modal').classList.remove('open'); }

function saveProduct() {
  const name = document.getElementById('f-name').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const stock = parseInt(document.getElementById('f-stock').value);
  const category = document.getElementById('f-category').value.trim();

  if (!name || isNaN(price) || isNaN(stock) || !category) {
    toast('Please fill all required fields.', 'error');
    return;
  }

  const sku = document.getElementById('f-sku').value.trim() || genSKU(category);
  const desc = document.getElementById('f-desc').value.trim();
  const image = document.getElementById('f-image').value.trim();
  const now = new Date().toISOString();

  if (editingId) {
    const idx = products.findIndex(p => p.id === editingId);
    products[idx] = { ...products[idx], name, price, stock, category, description: desc, sku, image, updatedAt: now };
    toast('Product updated successfully!', 'success');
  } else {
    const id = 'PRD-' + String(products.length + 1).padStart(3, '0');
    products.push({ id, name, price, stock, category, description: desc, sku, image, createdAt: now, updatedAt: now });
    toast('Product added successfully!', 'success');
  }

  save();
  renderProducts();
  closeModal();
}

// ── Delete ────────────────────────────────────────────────────────────────────
let deleteTarget = null;

function confirmDelete(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  deleteTarget = id;
  document.getElementById('confirm-msg').textContent = `"${p.name}" will be permanently removed from the inventory.`;
  document.getElementById('confirm-ok-btn').onclick = doDelete;
  document.getElementById('confirm-modal').classList.add('open');
}

function doDelete() {
  products = products.filter(p => p.id !== deleteTarget);
  save();
  renderProducts();
  closeConfirm();
  toast('Product deleted.', 'success');
}

function closeConfirm() { document.getElementById('confirm-modal').classList.remove('open'); }

// ── Import / Export ───────────────────────────────────────────────────────────
function exportJSON() {
  const data = { products, lastUpdated: new Date().toISOString(), count: products.length };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'products.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('products.json exported!', 'success');
}

function importJSON() { document.getElementById('json-import').click(); }

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const arr = data.products || (Array.isArray(data) ? data : null);
      if (!arr) throw new Error();
      products = arr;
      save();
      render();
      toast(`Imported ${arr.length} products from ${file.name}`, 'success');
    } catch {
      toast('Invalid JSON file format.', 'error');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✓' : '⚠'}</span> ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function genSKU(category) {
  const prefix = category.substring(0, 3).toUpperCase();
  return prefix + '-' + Math.random().toString(36).substring(2,7).toUpperCase();
}

function formatNum(n) {
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n.toFixed(0);
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeConfirm(); }
});

document.getElementById('product-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('product-modal')) closeModal();
});

document.getElementById('confirm-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('confirm-modal')) closeConfirm();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
